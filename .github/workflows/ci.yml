name: CI/CD Pipeline

# Two deploy branches:
# - `dev`    → tests → deploy-staging → smoke-staging (stops here, no prod).
#              Push to dev to preview a change on the staging CloudFront URL.
# - `master` → tests → deploy-staging → smoke-staging → [environment: production
#              approval] → deploy-prod → smoke-prod.
# PRs into either branch fire tests but no deploys.
on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

# OIDC: deploy jobs assume gh-deploy-datasheetminer via federated identity.
# id-token write is needed by aws-actions/configure-aws-credentials.
permissions:
  contents: read
  id-token: write

# Cancel redundant in-progress runs on the same ref. Deploy chains on
# master/dev keep cancel-in-progress=false so a deploy isn't aborted
# mid-flight by a follow-up commit; PR runs are cancellable.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/dev' }}

jobs:
  # ── Stage 1a: Python unit tests ─────────────────────────────────
  # Each test-* job delegates to ./Quickstart verify --only <stage> so the
  # local pre-push gate (./Quickstart verify) and CI exercise the same
  # commands. cli/quickstart.py:cmd_verify is the single source of truth.
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Verify (Python)
        run: ./Quickstart verify --only python

      # JUnit XML written by ./Quickstart verify lands in
      # outputs/test-reports/. Upload always (even on test failure) so the
      # run page has the artifact for post-mortem, then summarise pass/fail
      # to $GITHUB_STEP_SUMMARY so failure cause is visible without
      # `gh run view --log-failed`.
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-test-reports
          path: outputs/test-reports/python-*.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Summarise Python tests
        if: always()
        run: |
          # Parse JUnit XML and emit a markdown summary. stdlib only.
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import glob, sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          print("## Python tests")
          for path in sorted(glob.glob("outputs/test-reports/python-*.xml")):
              try:
                  root = ET.parse(path).getroot()
              except ET.ParseError as e:
                  print(f"- `{path}`: parse error — {e}")
                  continue
              # pytest emits <testsuites><testsuite ... /></testsuites>.
              # Older versions emit a bare <testsuite>. Handle both.
              suites = list(root.iter("testsuite"))
              if not suites:
                  continue
              total = sum(int(s.get("tests", 0)) for s in suites)
              fail = sum(int(s.get("failures", 0)) for s in suites)
              err = sum(int(s.get("errors", 0)) for s in suites)
              skip = sum(int(s.get("skipped", 0)) for s in suites)
              passed = total - fail - err - skip
              status = "✅" if fail == 0 and err == 0 else "❌"
              print(f"- {status} `{Path(path).name}` — {passed}/{total} passed, "
                    f"{fail} failed, {err} errored, {skip} skipped")
              if fail or err:
                  print()
                  print("<details><summary>Failures</summary>\n")
                  for case in root.iter("testcase"):
                      for fail_el in list(case.iter("failure")) + list(case.iter("error")):
                          name = f"{case.get('classname', '?')}::{case.get('name', '?')}"
                          msg = (fail_el.get("message") or "").splitlines()[0][:200]
                          print(f"- `{name}` — {msg}")
                  print("\n</details>")
          PY

  # ── Stage 1b: Python integration tests ─────────────────────────
  # Runs in parallel with test-python. Excludes `-m live` tests
  # (those require a deployed AWS stack and run via a separate trigger).
  # Uses moto-mocked AWS for the boto3 paths.
  test-integration:
    name: Test Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        run: uv sync --quiet

      # Some integration tests under TestBackendBuild / TestFrontendBuild
      # shell out to `npx tsc` / `npx vite build` to verify the build
      # pipeline works before a deploy. They need node + workspace
      # dependencies installed. (Redundant with test-backend / test-frontend
      # which run their own builds, but kept as a single-stop "deploy
      # readiness" check.)
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Test integration (excluding live)
        run: |
          mkdir -p outputs/test-reports
          uv run pytest tests/integration/ -m "not live" -v \
            --junitxml=outputs/test-reports/python-integration.xml

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-integration-test-reports
          path: outputs/test-reports/python-integration.xml
          if-no-files-found: ignore
          retention-days: 14

      - name: Summarise integration tests
        if: always()
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import xml.etree.ElementTree as ET
          from pathlib import Path

          path = "outputs/test-reports/python-integration.xml"
          if not Path(path).exists():
              print("## Integration tests\n- ⚠ no report file emitted")
          else:
              try:
                  root = ET.parse(path).getroot()
                  suites = list(root.iter("testsuite"))
                  total = sum(int(s.get("tests", 0)) for s in suites)
                  fail = sum(int(s.get("failures", 0)) for s in suites)
                  err = sum(int(s.get("errors", 0)) for s in suites)
                  skip = sum(int(s.get("skipped", 0)) for s in suites)
                  passed = total - fail - err - skip
                  status = "✅" if fail == 0 and err == 0 else "❌"
                  print(f"## Integration tests\n- {status} {passed}/{total} passed, "
                        f"{fail} failed, {err} errored, {skip} skipped")
                  if fail or err:
                      print("\n<details><summary>Failures</summary>\n")
                      for case in root.iter("testcase"):
                          for fail_el in list(case.iter("failure")) + list(case.iter("error")):
                              name = f"{case.get('classname', '?')}::{case.get('name', '?')}"
                              msg = (fail_el.get("message") or "").splitlines()[0][:200]
                              print(f"- `{name}` — {msg}")
                      print("\n</details>")
              except ET.ParseError as e:
                  print(f"## Integration tests\n- ❌ parse error: {e}")
          PY

  # ── Stage 1c: Backend unit tests ────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Verify (backend)
        run: ./Quickstart verify --only backend

  # ── Stage 1d: Frontend unit tests ──────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install workspace dependencies
        working-directory: app
        run: npm ci

      - name: Verify (frontend)
        run: ./Quickstart verify --only frontend

  # ── Stage 1e: Generated TS types are in sync ───────────────────
  # Phase 0 of todo/PYTHON_BACKEND.md: app/frontend/src/types/generated.ts
  # is committed to the repo and treated as part of the diff. This job
  # re-runs the codegen and fails the build if the committed file drifts
  # from the Pydantic models under specodex/models/. Drift means the
  # author edited a Pydantic model but forgot `./Quickstart gen-types`.
  test-codegen:
    name: Test Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        run: uv sync --quiet

      - name: Regenerate TypeScript types
        run: ./Quickstart gen-types

      - name: Verify generated.ts is in sync with Pydantic models
        run: |
          if ! git diff --exit-code app/frontend/src/types/generated.ts; then
            echo "::error::app/frontend/src/types/generated.ts is stale."
            echo "::error::Run './Quickstart gen-types' locally and commit the result."
            exit 1
          fi

  # ── Stage 2: Deploy to staging ─────────────────────────────────
  # Fires on push to master OR dev. PR runs are excluded — `ref` for a
  # PR is `refs/pull/N/merge`, which doesn't match either branch.
  # Deploy delegates to ./Quickstart deploy --stage staging so the
  # CI flow matches the local flow exactly (single source of truth).
  # SSM params are stage-scoped: /datasheetminer/staging/*.
  #
  # The cross-branch concurrency group serializes staging deploys so a
  # near-simultaneous push to dev and master can't trample the same
  # staging stack mid-deploy. cancel-in-progress=false keeps a queued
  # deploy waiting rather than dropping it.
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [test-python, test-integration, test-backend, test-frontend, test-codegen]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    environment: staging
    outputs:
      url: ${{ steps.extract.outputs.url }}
      distribution_id: ${{ steps.extract.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install uv (for Quickstart CLI)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::403059190476:role/gh-deploy-datasheetminer
          aws-region: ${{ env.AWS_REGION }}

      - name: Provision staging SSM params
        env:
          SSM_PREFIX: /datasheetminer/staging
          STRIPE_LAMBDA_URL: ${{ secrets.STRIPE_LAMBDA_URL }}
        run: |
          # Stripe Lambda URL (String, optional). Subscription middleware
          # treats empty/missing as 'unconfigured' and lets requests through.
          # SSM PutParameter rejects empty strings, so skip when unset.
          if [ -n "${STRIPE_LAMBDA_URL:-}" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/stripe-lambda-url" \
              --type String --value "${STRIPE_LAMBDA_URL}" --overwrite
          else
            echo "STRIPE_LAMBDA_URL secret unset — skipping ${SSM_PREFIX}/stripe-lambda-url"
          fi

      - name: Deploy staging via Quickstart
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: ./Quickstart deploy --stage staging

      # Upload synthesized CFN templates + asset manifests on failure so a
      # post-mortem doesn't require re-running the deploy. Skipped on
      # success (cdk.out churns every run, not worth the storage).
      - name: Upload cdk.out on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cdk-out-staging
          path: app/infrastructure/cdk.out/
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify staging stack status
        # `cdk deploy` returns success even when a stack is in
        # UPDATE_ROLLBACK_COMPLETE — the rollback succeeded, the deploy
        # didn't. Assert every stack converged to a *_COMPLETE state
        # that isn't a rollback before we run smoke against it.
        run: |
          for stack in DatasheetMiner-Staging-Database DatasheetMiner-Staging-Api DatasheetMiner-Staging-Frontend; do
            STATUS=$(aws cloudformation describe-stacks --stack-name "$stack" --query 'Stacks[0].StackStatus' --output text)
            case "$STATUS" in
              CREATE_COMPLETE|UPDATE_COMPLETE) echo "$stack: $STATUS" ;;
              *) echo "::error::$stack: $STATUS (expected CREATE_COMPLETE or UPDATE_COMPLETE)"; exit 1 ;;
            esac
          done

      - name: Extract stack outputs
        id: extract
        run: |
          URL=$(./Quickstart cdk-outputs --key CloudFrontUrl)
          DIST_ID=$(./Quickstart cdk-outputs --key DistributionId)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "Staging URL: $URL"

      - name: Invalidate CloudFront cache
        if: steps.extract.outputs.distribution_id != ''
        run: |
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --id "$INV_ID"

  # ── Stage 3: Smoke tests against staging ───────────────────────
  smoke-staging:
    name: Smoke Staging
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Wait for /health to go 200
        run: ./Quickstart wait-health "${{ needs.deploy-staging.outputs.url }}" --retries 60 --label Staging

      - name: Run staging contract tests
        env:
          API_BASE_URL: ${{ needs.deploy-staging.outputs.url }}
        run: uv run pytest tests/staging/ -v

      - name: Run smoke tests
        env:
          API_BASE_URL: ${{ needs.deploy-staging.outputs.url }}
        run: uv run pytest tests/post_deploy/ -v

  # ── Stage 4: Deploy to production ──────────────────────────────
  # Gated on smoke-staging success + environment approval. Master-only:
  # dev pushes stop after smoke-staging so the staging URL can be
  # visually verified before merging dev → master.
  deploy-prod:
    name: Deploy Prod
    runs-on: ubuntu-latest
    needs: [smoke-staging]
    if: github.ref == 'refs/heads/master'
    environment: production
    outputs:
      url: ${{ steps.extract.outputs.url }}
      distribution_id: ${{ steps.extract.outputs.distribution_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install uv (for Quickstart CLI)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: arn:aws:iam::403059190476:role/gh-deploy-datasheetminer
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate prod deploy-time secrets
        # Fail fast if required domain config is missing — Quickstart would
        # refuse anyway, but catching it here surfaces it before asset builds.
        # HOSTED_ZONE_ID is intentionally not in this list — the CDK now
        # uses HostedZone.fromLookup which resolves the zone by name.
        run: |
          missing=()
          for s in AWS_ACCOUNT_ID DOMAIN_NAME CERTIFICATE_ARN; do
            eval "val=\${$s:-}"
            [ -z "$val" ] && missing+=("$s")
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required prod secrets: ${missing[*]}"
            exit 1
          fi
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}

      - name: Provision prod SSM params
        env:
          SSM_PREFIX: /datasheetminer/prod
          STRIPE_LAMBDA_URL: ${{ secrets.STRIPE_LAMBDA_URL }}
        run: |
          # See deploy-staging for rationale (empty == unconfigured).
          if [ -n "${STRIPE_LAMBDA_URL:-}" ]; then
            aws ssm put-parameter \
              --name "${SSM_PREFIX}/stripe-lambda-url" \
              --type String --value "${STRIPE_LAMBDA_URL}" --overwrite
          else
            echo "STRIPE_LAMBDA_URL secret unset — skipping ${SSM_PREFIX}/stripe-lambda-url"
          fi

      - name: Deploy prod via Quickstart
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          HOSTED_ZONE_NAME: ${{ secrets.HOSTED_ZONE_NAME }}
        run: ./Quickstart deploy --stage prod

      - name: Upload cdk.out on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cdk-out-prod
          path: app/infrastructure/cdk.out/
          if-no-files-found: ignore
          retention-days: 7

      - name: Verify prod stack status
        run: |
          for stack in DatasheetMiner-Prod-Database DatasheetMiner-Prod-Api DatasheetMiner-Prod-Frontend; do
            STATUS=$(aws cloudformation describe-stacks --stack-name "$stack" --query 'Stacks[0].StackStatus' --output text)
            case "$STATUS" in
              CREATE_COMPLETE|UPDATE_COMPLETE) echo "$stack: $STATUS" ;;
              *) echo "::error::$stack: $STATUS (expected CREATE_COMPLETE or UPDATE_COMPLETE)"; exit 1 ;;
            esac
          done

      - name: Extract stack outputs
        id: extract
        run: |
          # Smoke against the CloudFront URL, not the SiteUrl custom domain.
          # SiteUrl == "https://${DOMAIN_NAME}" — DOMAIN_NAME is a secret, and
          # GitHub Actions strips secret-derived values from job outputs (the
          # value arrives empty in smoke-prod's `needs.deploy-prod.outputs.url`).
          # CloudFrontUrl is the *.cloudfront.net domain; not secret-derived,
          # passes between jobs cleanly, and serves identical content (the
          # custom domain is a Route53 alias to this distribution anyway).
          URL=$(./Quickstart cdk-outputs --key CloudFrontUrl)
          DIST_ID=$(./Quickstart cdk-outputs --key DistributionId)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DIST_ID" >> "$GITHUB_OUTPUT"
          echo "Production URL: $URL"

      - name: Invalidate CloudFront cache
        if: steps.extract.outputs.distribution_id != ''
        run: |
          INV_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ steps.extract.outputs.distribution_id }}" \
            --id "$INV_ID"

  # ── Stage 5: Smoke tests against production ────────────────────
  smoke-prod:
    name: Smoke Prod
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --quiet

      - name: Wait for /health to go 200
        run: ./Quickstart wait-health "${{ needs.deploy-prod.outputs.url }}" --retries 60 --label Production

      - name: Run smoke tests
        env:
          API_BASE_URL: ${{ needs.deploy-prod.outputs.url }}
        run: uv run pytest tests/post_deploy/ -v

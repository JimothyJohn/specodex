name: Manual contract tests (any URL)

# Manual-only ad-hoc smoke. Distinct from `smoke-staging` in ci.yml,
# which is hardwired to the just-deployed staging URL — this one runs
# tests/staging/ against an ARBITRARY URL passed via workflow_dispatch
# input. Use it to smoke a feature branch deploy, a PR preview, or a
# remote dev environment without re-running the whole CI deploy chain.
#
# Tests under tests/staging/ create/mutate data. Don't run this against
# production — there's no guard, just don't.
on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "API base URL to test against"
        required: true
        default: "http://localhost:3001"

jobs:
  staging-tests:
    name: Staging Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --locked --quiet

      - name: Run staging contract tests
        env:
          API_BASE_URL: ${{ github.event.inputs.api_url }}
        run: uv run pytest tests/staging/ -v

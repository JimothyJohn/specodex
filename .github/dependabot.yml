version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # app/ is an npm workspace with one root package-lock.json that covers
  # backend/, frontend/, and infrastructure/. Targeting sub-package
  # directories causes Dependabot to bump a sub-package's package.json
  # without regenerating the workspace-root lock — npm ci then fails
  # the lock-vs-package-json sync check on every CI job. So we point a
  # single entry at the workspace root and let Dependabot's npm
  # ecosystem traverse the workspaces.
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      app-minor-patch:
        update-types: ["minor", "patch"]
        # Pin pre-1.0 packages out of the auto-merge group: a 0.x→0.y
        # bump is technically "minor" by semver but practically a
        # breaking change (see eslint-plugin-react-refresh 0.4→0.5 in
        # PR #11/#31, which became ESM-only and broke our CJS config).
        exclude-patterns:
          - "eslint-plugin-react-refresh"
          - "esbuild"
    ignore:
      # uuid v12+ is ESM-only; app/backend/'s jest (ts-jest CJS, no
      # transformIgnorePatterns) can't load it without a real ESM
      # migration — and app/backend/ is slated for deletion in
      # todo/PYTHON_BACKEND.md Phase 3. Hold on 11.x until that lands;
      # remove this entry as part of the Phase 3 cleanup. See PR #147
      # (closed 2026-05-12) for the diagnosis.
      - dependency-name: "uuid"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

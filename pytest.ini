[tool:pytest]
# Pytest configuration for specodex
# app/backend_py/tests covers the FastAPI backend (Express → Python
# migration, todo/PYTHON_BACKEND.md). Both trees run under one
# `./Quickstart verify --only python` pass.
testpaths = tests app/backend_py/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests as security-focused tests
    performance: marks tests as performance tests
    live: requires a deployed AWS stack or live API access (deselect with '-m "not live"')
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:google.*
    ignore::UserWarning:httpx.*
